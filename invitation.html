<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>초대합니다 · 몸 만 오 세 요</title>
<style>
  @font-face {
    font-family: 'ChosunGs';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGs.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #e8e2d8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'ChosunGs', 'Batang', serif;
  }

  .frame {
    position: relative;
    width: 360px;
    height: 521px;
    background: #ffffff;
  }

  /* Each heart group */
  .heart-group {
    position: absolute;
    width: 144.9px;
    height: 157px;
  }

  /* Figma coordinates */
  .g1 { left: 44px;  top: 19px;  }
  .g2 { left: 172px; top: 19px;  }
  .g3 { left: 0px;   top: 170px; }
  .g4 { left: 108px; top: 170px; }
  .g5 { left: 215px; top: 170px; }

  .heart-group svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .heart-group .char {
    position: absolute;
    left: 36px;
    top: 28px;
    width: 72.45px;
    height: 82px;
    font-size: 68px;
    font-weight: 500;
    line-height: 82px;
    text-align: center;
    color: #000000;
    z-index: 2;
  }

  /* Bottom section */
  .location-label {
    position: absolute;
    left: 137px;
    top: 381px;
    width: 85px;
    height: 28px;
    font-size: 23px;
    font-weight: 500;
    line-height: 28px;
    text-align: center;
    color: #000000;
  }

  .location-btn {
    position: absolute;
    left: 56px;
    top: 418px;
    width: 249px;
    height: 62px;
    background: #0D0D0D;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: crosshair;
    overflow: hidden;
  }

  .location-btn span {
    font-size: 23px;
    font-weight: 500;
    line-height: 28px;
    text-align: center;
    /* text starts invisible (same color as bg) */
    color: transparent;
    background: radial-gradient(
      circle 36px at var(--mx, -100px) var(--my, -100px),
      #ffffff 0%,
      #ffffff 40%,
      #0D0D0D 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: none;
    user-select: none;
  }
</style>
</head>
<body>

<div class="frame">

  <!-- 몸 -->
  <div class="heart-group g1">
    <svg viewBox="0 0 145 157" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M72.5 157C72.5 157 145 107 145 52C145 23.3 120.7 0 96.5 0C83.5 0 72.5 10 72.5 10C72.5 10 61.5 0 48.5 0C24.3 0 0 23.3 0 52C0 107 72.5 157 72.5 157Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    </svg>
    <div class="char">몸</div>
  </div>

  <!-- 만 -->
  <div class="heart-group g2">
    <svg viewBox="0 0 145 157" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M72.5 157C72.5 157 145 107 145 52C145 23.3 120.7 0 96.5 0C83.5 0 72.5 10 72.5 10C72.5 10 61.5 0 48.5 0C24.3 0 0 23.3 0 52C0 107 72.5 157 72.5 157Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    </svg>
    <div class="char">만</div>
  </div>

  <!-- 오 -->
  <div class="heart-group g3">
    <svg viewBox="0 0 145 157" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M72.5 157C72.5 157 145 107 145 52C145 23.3 120.7 0 96.5 0C83.5 0 72.5 10 72.5 10C72.5 10 61.5 0 48.5 0C24.3 0 0 23.3 0 52C0 107 72.5 157 72.5 157Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    </svg>
    <div class="char">오</div>
  </div>

  <!-- 세 -->
  <div class="heart-group g4">
    <svg viewBox="0 0 145 157" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M72.5 157C72.5 157 145 107 145 52C145 23.3 120.7 0 96.5 0C83.5 0 72.5 10 72.5 10C72.5 10 61.5 0 48.5 0C24.3 0 0 23.3 0 52C0 107 72.5 157 72.5 157Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    </svg>
    <div class="char">세</div>
  </div>

  <!-- 요 -->
  <div class="heart-group g5">
    <svg viewBox="0 0 145 157" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M72.5 157C72.5 157 145 107 145 52C145 23.3 120.7 0 96.5 0C83.5 0 72.5 10 72.5 10C72.5 10 61.5 0 48.5 0C24.3 0 0 23.3 0 52C0 107 72.5 157 72.5 157Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    </svg>
    <div class="char">요</div>
  </div>

  <!-- 비밀장소 라벨 -->
  <div class="location-label">비밀장소</div>

  <!-- 주소 버튼 -->
  <div class="location-btn">
    <span>서울특별시 강서구 염창동</span>
  </div>

</div>

<script>
  const btn = document.querySelector('.location-btn');
  const span = btn.querySelector('span');

  btn.addEventListener('mousemove', (e) => {
    const rect = span.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    span.style.setProperty('--mx', x + 'px');
    span.style.setProperty('--my', y + 'px');
  });

  btn.addEventListener('mouseleave', () => {
    span.style.setProperty('--mx', '-100px');
    span.style.setProperty('--my', '-100px');
  });
</script>

</body>
</html>
